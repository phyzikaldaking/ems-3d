name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure governance + web baseline artifacts exist
        run: |
          test -f docs/EMS_PRODUCTION_BLUEPRINT.md
          test -f apps/web/index.html
          test -f apps/web/styles.css
          test -f apps/web/main.js

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
